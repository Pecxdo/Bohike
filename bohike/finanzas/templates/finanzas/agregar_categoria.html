{% extends 'finanzas/base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/categorias.css' %}">
{% endblock %}

{% block content %}

<h2>➕ Nueva Categoría</h2>

<div class="form-card">
    <form method="post">
        {% csrf_token %}
        <input type="text" name="nombre" placeholder="Nombre categoría" required>
        <button type="submit">Guardar</button>
    </form>
</div>

{% endblock %}
